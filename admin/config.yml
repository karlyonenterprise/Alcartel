# ══════════════════════════════════════════════════════════
# ALCARTEL — Configuração do Decap CMS com DecapBridge PKCE
#
# Autenticação: DecapBridge (PKCE)
# Repositório: karlyonenterprise/Alcartel (GitHub)
# Host: Vercel (https://alcartel.vercel.app)
# ══════════════════════════════════════════════════════════

backend:
  name: git-gateway
  repo: karlyonenterprise/Alcartel
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/dd9c0db1-f16e-487f-8d5a-ec2bc19e58f3/pkce
  auth_token_endpoint: /sites/dd9c0db1-f16e-487f-8d5a-ec2bc19e58f3/token
  gateway_url: https://gateway.decapbridge.com

# Onde ficam as imagens enviadas pelo widget "image" (ex.: logótipo da
# empresa em cada vaga). Pasta própria, separada de content/vagas/ (que é
# só dados JSON) para manter cada pasta com um único tipo de conteúdo.
media_folder: "assets/empresas"
public_folder: "/assets/empresas"

# Ver quem fez as alterações (rastreio de commits automático)
commit_messages:
  create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Campos de autenticação PKCE (OIDC)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Logo melhorado do Decap + Bridge
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# URL do site
site_url: https://alcartel.vercel.app

publish_mode: editorial_workflow

# ── Regras globais de geração de slug (nomes de ficheiro) ──
# Sem isto, o Decap mantém acentos/caracteres unicode "em bruto" no nome do
# ficheiro (ex.: "avaliação" em vez de "avaliacao"), o que já partiu URLs no
# site (o "#" resultante era interpretado como fragmento de URL, não como
# parte do caminho, e a página deixava de ser indexável/clicável). encoding:
# "ascii" + clean_accents: true garante que o Decap CMS transliteres estes
# caracteres para ASCII simples ao criar o nome do ficheiro/slug.
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  - name: "vagas"
    label: "📋 Vagas"
    label_singular: "Vaga"
    folder: "content/vagas"              # cada vaga = 1 ficheiro em /content/vagas/
                                          # ÚNICA fonte de dados de vagas do site —
                                          # scripts/gerar-site.js lê exactamente daqui
                                          # no build e gera /vagas/, /categoria/,
                                          # /cidade/ e o grid de index.html/vagas.html.
    create: true
    slug: "{{fields.titulo}}-{{fields.local}}"     # gera ex: programador-beira-sofala
    extension: "json"
    format: "json"
    summary: "{{fields.titulo}} — {{fields.local}}"
    fields:
      # ── 1. Título da Vaga ───────────────────────────────────
      - { name: "titulo", label: "Título da Vaga", widget: "string", required: true }

      # ── 2. Nome da Empresa ──────────────────────────────────
      - { name: "empresa", label: "Nome da Empresa", widget: "string", required: true }

      # ── 3. Logótipo da Empresa ──────────────────────────────
      - name: "imagem_empresa"
        label: "Logótipo da Empresa"
        widget: "image"
        required: false
        hint: "Opcional. Se não for enviada, o site usa o logótipo da Alcartel como imagem por defeito."

      # ── 4. Local da Vaga ─────────────────────────────────────
      - { name: "local", label: "Local da Vaga", widget: "string", required: true, hint: "Ex: Beira, Sofala" }

      # ── 5. Tipo de Contrato ─────────────────────────────────
      - name: "tipo_contrato"
        label: "Tipo de Contrato"
        widget: "select"
        required: true
        options: ["Tempo Inteiro", "Meio Período", "Estágio", "Freelance", "Temporário", "Prestação de Serviços"]

      # ── 6. Número de Vagas ───────────────────────────────────
      - name: "numero_vagas"
        label: "Número de Vagas"
        widget: "number"
        value_type: "int"
        required: false
        min: 1
        hint: "Opcional. Se não preenchido, este campo não aparece nos Detalhes da Vaga."

      # ── 6b. Salário ──────────────────────────────────────────
      - name: "salario"
        label: "Salário"
        widget: "string"
        required: false
        hint: "Opcional. Ex: '15.000 MT a 25.000 MT' ou 'A negociar'. Se em branco, não aparece nos Detalhes da Vaga."

      # ── 6c. Idioma ───────────────────────────────────────────
      - name: "idioma"
        label: "Idioma"
        widget: "select"
        required: false
        options: ["Português", "Inglês", "Português e Inglês", "Outro"]
        hint: "Opcional. Idioma exigido ou usado na vaga."

      # ── 7. Nível Académico ──────────────────────────────────
      - name: "nivel_academico"
        label: "Nível Académico Mínimo"
        widget: "select"
        required: true
        options:
          - "Ensino Primário (6º ano)"
          - "Ensino Secundário (9º ano)"
          - "Ensino Secundário (12º ano)"
          - "Formação Profissional"
          - "Diploma/Bacharelato"
          - "Licenciatura"
          - "Mestrado"
          - "Doutorado"
          - "Não Especificado"
        hint: "Selecione o nível académico mínimo exigido para esta posição."

      # ── 8. Descrição Geral ──────────────────────────────────
      - name: "descricao"
        label: "Descrição Geral da Vaga"
        widget: "markdown"
        required: false
        modes: ["raw"]
        buttons: ["bold", "bulleted-list"]
        hint: "Breve resumo ou contexto geral sobre a vaga. Opcional. Use o botão de negrito e de marcadores conforme necessário."

      # ── 9. Principais Responsabilidades ─────────────────────
      - name: "responsabilidades"
        label: "Principais Responsabilidades"
        widget: "markdown"
        required: true
        modes: ["raw"]
        buttons: ["bold", "bulleted-list"]
        hint: "Descreva as principais responsabilidades. Use o botão de marcadores para listar cada ponto."

      # ── 10. Requisitos ────────────────────────────────────────
      - name: "requisitos"
        label: "Requisitos"
        widget: "markdown"
        required: true
        modes: ["raw"]
        buttons: ["bold", "bulleted-list"]
        hint: "Liste os requisitos necessários. Use o botão de marcadores para cada requisito."
      
      # ── 11. Documentos Necessarios ──────────────────────────
      - name: "documentos"
        label: "Documentos Necessarios"
        widget: "markdown"
        required: false
        modes: ["raw"]
        buttons: ["bold", "bulleted-list"]
        hint: "Documentos a apresentar na candidatura. Opcional. Use marcadores para cada documento."

      # ── 12. Como Candidatar-se ──────────────────────────────
      # Widget customizado (registado em admin/index.html) que guarda
      # { email: "...", link: "..." } e IMPEDE a publicação se os dois
      # estiverem vazios. Ver admin/index.html para o código do widget.
      - name: "candidatura"
        label: "Como Candidatar-se"
        widget: "candidatura"
        required: true
        hint: "Preenche pelo menos um dos dois campos (e-mail ou link). Não é possível publicar se ambos ficarem vazios."

      # ── 13. Data Limite para Candidatura ─────────────────────
      - name: "data_limite"
        label: "Data Limite para Candidatura"
        widget: "datetime"
        required: true
        date_format: "YYYY-MM-DD"
        time_format: false
        picker_utc: false
        hint: "Apenas a data (sem hora)."

      # ── 14. Categoria ────────────────────────────────────────
      # Define em que página /categoria/ a vaga aparece e a etiqueta
      # mostrada no cartão e na página da vaga. gerar-site.js já lê este
      # campo (dados.categoria); sem ele, todas as vagas caíam em "Outra".
      # Ajusta a lista de opções conforme os sectores da Karlyon.
      - name: "categoria"
        label: "Categoria"
        widget: "select"
        required: true
        # NOTA: estes valores têm de corresponder exactamente às categorias já
        # em uso em content/vagas/*.json (ver seo.categoria / categoria), porque
        # scripts/gerar-site.js usa slugify(categoria) para o nome do ficheiro
        # em /categoria/. Um rótulo diferente aqui geraria um URL novo em vez
        # de reaproveitar a página /categoria/ já existente e indexada.
        # ─── Categoria ────────────────────────────────────────────────
        options:
          - "Saúde"
          - "Educação e Professorado"
          - "Tecnologias de Informação"
          - "Administração e Gestão"
          - "Contabilidade e Finanças"
          - "Hotelaria e Turismo"
          - "Comércio e Vendas"
          - "Recursos Humanos"
          - "Engenharia"
          - "Construção Civil"
          - "Electricidade e Electrónica"
          - "Mecânica"
          - "Agricultura e Pecuária"
          - "Transportes e Logística"
          - "Direito e Justiça"
          - "Comunicação e Marketing"
          - "Indústria"
          - "Segurança"
          - "Limpeza e Serviços Gerais"
          - "Arte e Design"
          - "Outros"

      # ── 15. Palavras-chave (SEO) ─────────────────────────────
      # Vão para a tag <meta name="keywords"> e aparecem como etiquetas
      # visíveis no fim da página da vaga — ajudam o Google a perceber do
      # que a vaga trata e reforçam a relevância para pesquisas locais
      # (ex.: "emprego beira", "vagas sofala"). gerar-site.js já lê este
      # campo (dados.palavras_chave); não é preciso mexer no script.
      - name: "palavras_chave"
        label: "Palavras-chave (SEO)"
        widget: "string"
        required: false
        hint: "Separadas por vírgula. Ex: emprego beira, técnico manutenção, vagas sofala, karlyon"

      # ── Campos técnicos gerados automaticamente ─────────────
      # Não aparecem no formulário do administrador. Existem para não
      # quebrar o site caso scripts/gerar-site.js ainda dependa deles
      # (ex.: ordenar por data de publicação, filtrar vagas "Abertas").
      # Se confirmares que gerar-site.js não usa mais estes campos,
      # podes removê-los sem problema.
      - { name: "data_publicacao", label: "Data de Publicação (automático)", widget: "hidden", default: "{{now}}" }
      - { name: "estado_vaga", label: "Estado da Vaga (automático)", widget: "hidden", default: "Aberta" }
      - { name: "destaque", label: "Vaga em Destaque (automático)", widget: "hidden", default: false }

  # ══════════════════════════════════════════════════════════
  # NOTÍCIAS — colecção "Notícias e Dicas de Emprego" apresentada na
  # homepage (2 mais recentes) e em /noticias (listagem completa) +
  # /noticias/{slug} (página individual). Mesmo backend/repositório/
  # regras de slug da colecção "vagas" acima — não é um CMS separado,
  # apenas uma segunda colecção no MESMO admin/config.yml.
  # scripts/gerar-site.js lê exactamente esta pasta no build.
  # ══════════════════════════════════════════════════════════
  - name: "noticias"
    label: "📰 Notícias"
    label_singular: "Notícia"
    folder: "content/noticias"           # cada notícia = 1 ficheiro em /content/noticias/
    create: true
    slug: "{{fields.titulo}}"            # slug automático a partir do título (ex: 5-dicas-para-...)
    extension: "json"
    format: "json"
    summary: "{{fields.titulo}} — {{fields.estado}}"
    fields:
      # ── 1. Título ────────────────────────────────────────────
      - { name: "titulo", label: "Título", widget: "string", required: true }

      # ── 2. Resumo ────────────────────────────────────────────
      - name: "resumo"
        label: "Resumo"
        widget: "text"
        required: true
        hint: "Texto curto mostrado nos cartões de notícia (homepage e /noticias). Recomendado até 160 caracteres."

      # ── 3. Conteúdo ──────────────────────────────────────────
      - name: "conteudo"
        label: "Conteúdo"
        widget: "markdown"
        required: true
        modes: ["raw"]
        buttons: ["bold", "bulleted-list"]
        hint: "Texto completo da notícia. Use o botão de negrito e de marcadores conforme necessário."

      # ── 4. Imagem de Destaque ────────────────────────────────
      - name: "imagem_destaque"
        label: "Imagem de Destaque"
        widget: "image"
        required: false
        media_folder: "/assets/noticias"
        public_folder: "/assets/noticias"
        hint: "Opcional. Se não for enviada, o site usa a imagem genérica da Alcartel."

      # ── 5. Autor ─────────────────────────────────────────────
      - { name: "autor", label: "Autor", widget: "string", required: true, default: "Equipa Alcartel" }

      # ── 6. Categoria ─────────────────────────────────────────
      - name: "categoria"
        label: "Categoria"
        widget: "select"
        required: true
        options:
          - "Notícias Alcartel"
          - "Mercado de Trabalho"
          - "Dicas de Carreira"
          - "Currículo e Candidaturas"
          - "Entrevistas"
          - "Educação e Formação"

      # ── 7. Data de Publicação ────────────────────────────────
      - name: "data_publicacao"
        label: "Data de Publicação"
        widget: "datetime"
        required: true
        default: "{{now}}"
        date_format: "YYYY-MM-DD"
        time_format: "HH:mm"
        picker_utc: false

      # ── 8. Estado ────────────────────────────────────────────
      # Só notícias com estado "Publicado" são geradas no site/sitemap
      # (ver scripts/gerar-site.js). Uma notícia "Rascunho" fica
      # guardada no repositório mas continua invisível ao público.
      - name: "estado"
        label: "Estado"
        widget: "select"
        required: true
        default: "Rascunho"
        options: ["Rascunho", "Publicado"]

      # ── 9. Meta Título (SEO) ─────────────────────────────────
      - name: "meta_titulo"
        label: "Meta Título (SEO)"
        widget: "string"
        required: false
        hint: "Opcional. Se em branco, usa-se \"Título – Alcartel Notícias\"."

      # ── 10. Meta Descrição (SEO) ──────────────────────────────
      - name: "meta_descricao"
        label: "Meta Descrição (SEO)"
        widget: "text"
        required: false
        hint: "Opcional. Se em branco, usa-se o Resumo. Recomendado até 160 caracteres."

# NOTA: a colecção "Páginas Institucionais" (edição de sobre.html/servicos.html
# inteiros por um único campo markdown) foi removida nesta ronda — estes
# ficheiros são páginas HTML completas (head/SEO/header/nav/footer) e um
# widget markdown não tem como editar apenas o conteúdo sem destruir essa
# estrutura. Se for necessário editar estas páginas pelo CMS no futuro, o
# caminho correcto é extrair só os blocos de conteúdo variável para campos
# estruturados (texto, imagem, etc.) e usar um template para recompor a
# página — isto fica como proposta em aberto, fora do âmbito desta integração.
