# ══════════════════════════════════════════════════════════
# ALCARTEL — Configuração do Decap CMS com DecapBridge PKCE
#
# Autenticação: DecapBridge (PKCE)
# Repositório: karlyonenterprise/Alcartel (GitHub)
# Host: Vercel (https://alcartel.vercel.app)
# ══════════════════════════════════════════════════════════

backend:
  name: git-gateway
  repo: karlyonenterprise/Alcartel
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/dd9c0db1-f16e-487f-8d5a-ec2bc19e58f3/pkce
  auth_token_endpoint: /sites/dd9c0db1-f16e-487f-8d5a-ec2bc19e58f3/token
  gateway_url: https://gateway.decapbridge.com

# Onde ficam as imagens enviadas pelo widget "image" (ex.: logótipo da
# empresa em cada vaga). Pasta própria, separada de content/vagas/ (que é
# só dados JSON) para manter cada pasta com um único tipo de conteúdo.
media_folder: "assets/empresas"
public_folder: "/assets/empresas"

# Ver quem fez as alterações (rastreio de commits automático)
commit_messages:
  create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
  uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
  openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge

# Campos de autenticação PKCE (OIDC)
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

# Logo melhorado do Decap + Bridge
logo_url: https://decapbridge.com/decapcms-with-bridge.svg

# URL do site
site_url: https://alcartel.vercel.app

# Onde o CMS guarda os ficheiros de mídia enviados (logotipos, fotos de vagas)
media_folder: "uploads"
public_folder: "/uploads"

publish_mode: editorial_workflow

collections:
  - name: "vagas"
    label: "Vagas de Emprego"
    label_singular: "Vaga"
    folder: "content/vagas"              # cada vaga = 1 ficheiro em /content/vagas/
                                          # ÚNICA fonte de dados de vagas do site —
                                          # scripts/gerar-site.js lê exactamente daqui
                                          # no build e gera /vagas/, /categoria/,
                                          # /cidade/ e o grid de index.html/vagas.html.
    create: true
    slug: "{{cargo}}-{{fields.local_contrato.provincia}}"   # gera ex: programador-maputo
    extension: "json"
    format: "json"
    summary: "{{fields.informacoes_gerais.titulo}} — {{fields.local_contrato.provincia}}"
    fields:
      # Campos técnicos (não formam uma "secção" mas são necessários ao gerador do site)
      - { name: "cargo", label: "Cargo (usado apenas para gerar o slug/URL)", widget: "string", hint: "Ex: programador. Não aparece no site, só serve para o endereço da página." }
      - name: "imagem_empresa"
        label: "Imagem / Logótipo da Empresa"
        widget: "image"
        required: false
        hint: "Opcional. Se não for enviada, o site usa o logótipo da Alcartel como imagem por defeito."
      - { name: "destaque", label: "Vaga em Destaque (aparece na página inicial)", widget: "boolean", default: false }

      # ── 1. Informações Gerais ──────────────────────────────
      - name: "informacoes_gerais"
        label: "1. Informações Gerais"
        widget: "object"
        collapsed: false
        fields:
          - { name: "codigo_vaga", label: "Código da Vaga", widget: "string", required: false, hint: "Ex: ALC-2026-014" }
          - { name: "titulo", label: "Título da Vaga", widget: "string" }
          - { name: "empresa", label: "Empresa", widget: "string" }
          - { name: "area", label: "Área", widget: "string", required: false, hint: "Ex: Comercial, Tecnologia, Saúde" }
          - { name: "departamento", label: "Departamento", widget: "string", required: false }
          - { name: "numero_vagas", label: "Número de Vagas", widget: "number", valueType: "int", default: 1, required: false, min: 1 }
          - { name: "data_publicacao", label: "Data de Publicação", widget: "datetime" }
          - { name: "data_validade", label: "Data Limite para Candidatura", widget: "datetime", required: false }
          - name: "estado_vaga"
            label: "Estado da Vaga"
            widget: "select"
            options: ["Aberta", "Em análise", "Fechada", "Suspensa"]
            default: "Aberta"

      # ── 2. Local e Contrato ─────────────────────────────────
      - name: "local_contrato"
        label: "2. Local e Contrato"
        widget: "object"
        collapsed: false
        fields:
          - { name: "pais", label: "País", widget: "string", default: "Moçambique" }
          - name: "provincia"
            label: "Província/Estado"
            widget: "select"
            options: ["Maputo", "Maputo Cidade", "Gaza", "Inhambane", "Sofala", "Manica", "Tete", "Zambézia", "Nampula", "Niassa", "Cabo Delgado"]
          - { name: "cidade", label: "Cidade", widget: "string", required: false }
          - name: "regime_trabalho"
            label: "Regime de Trabalho"
            widget: "select"
            options: ["Presencial", "Remoto", "Híbrido"]
            default: "Presencial"
            required: false
          - name: "tipo_contrato"
            label: "Tipo de Contrato"
            widget: "select"
            options: ["Tempo inteiro", "Meio período", "Estágio", "Freelance", "Temporário"]
          - { name: "horario_trabalho", label: "Horário de Trabalho", widget: "string", required: false, hint: "Ex: Segunda a Sexta, 08h00-17h00" }

      # ── 3. Remuneração ──────────────────────────────────────
      - name: "remuneracao"
        label: "3. Remuneração"
        widget: "object"
        collapsed: true
        fields:
          - { name: "salario_min", label: "Salário Mínimo", widget: "number", required: false }
          - { name: "salario_max", label: "Salário Máximo", widget: "number", required: false }
          - name: "moeda"
            label: "Moeda"
            widget: "select"
            options: ["MZN", "USD", "ZAR", "EUR"]
            default: "MZN"
            required: false
          - name: "periodicidade"
            label: "Periodicidade"
            widget: "select"
            options: ["Mensal", "Anual", "Semanal", "Diária", "Por hora"]
            default: "Mensal"
            required: false
          - { name: "salario_negociavel", label: "Salário Negociável", widget: "boolean", default: false, required: false }
          - { name: "beneficios", label: "Benefícios", widget: "text", required: false, hint: "Ex: Seguro de saúde, subsídio de transporte, formação..." }

      # ── 4. Perfil da Vaga ───────────────────────────────────
      - name: "perfil"
        label: "4. Perfil da Vaga"
        widget: "object"
        collapsed: false
        fields:
          - { name: "descricao", label: "Descrição", widget: "markdown" }
          - { name: "responsabilidades", label: "Responsabilidades", widget: "markdown", required: false }
          - { name: "requisitos_obrigatorios", label: "Requisitos Obrigatórios", widget: "markdown" }
          - { name: "requisitos_desejaveis", label: "Requisitos Desejáveis", widget: "markdown", required: false }
          - { name: "escolaridade", label: "Escolaridade", widget: "string", required: false }
          - { name: "experiencia", label: "Experiência", widget: "string", required: false }
          - { name: "competencias_tecnicas", label: "Competências Técnicas", widget: "text", required: false }
          - { name: "competencias_comportamentais", label: "Competências Comportamentais", widget: "text", required: false }
          - { name: "idiomas", label: "Idiomas", widget: "string", required: false }
          - { name: "certificacoes", label: "Certificações", widget: "string", required: false }

      # ── 5. Candidatura ──────────────────────────────────────
      - name: "candidatura"
        label: "5. Candidatura"
        widget: "object"
        collapsed: true
        fields:
          - { name: "documentos_exigidos", label: "Documentos Exigidos", widget: "text", required: false }
          - { name: "como_candidatar", label: "Como Candidatar-se", widget: "text", required: false }
          - { name: "contacto", label: "Contacto", widget: "string", required: false }
          - name: "link_candidatura"
            label: "E-mail ou Link para Candidatura"
            widget: "string"
            hint: "Use um e-mail no formato mailto:exemplo@empresa.co.mz ou um link completo (https://...)."
          - { name: "observacoes", label: "Observações", widget: "text", required: false }

      # ── 6. SEO ───────────────────────────────────────────────
      - name: "seo"
        label: "6. SEO"
        widget: "object"
        collapsed: true
        fields:
          - name: "categoria"
            label: "Categoria"
            widget: "select"
            options: ["Informática", "Contabilidade e Finanças", "Logística e Transportes", "Recursos Humanos", "Vendas e Marketing", "Saúde", "Educação", "Construção", "Mineração e Petróleo e Gás", "Agricultura", "Administração", "Outra"]
          - { name: "palavras_chave", label: "Palavras-chave", widget: "string", required: false, hint: "Separadas por vírgula" }
          - { name: "url_amigavel", label: "URL Amigável", widget: "string", required: false, hint: "Deixe em branco para ser gerada automaticamente" }

# NOTA: a colecção "Páginas Institucionais" (edição de sobre.html/servicos.html
# inteiros por um único campo markdown) foi removida nesta ronda — estes
# ficheiros são páginas HTML completas (head/SEO/header/nav/footer) e um
# widget markdown não tem como editar apenas o conteúdo sem destruir essa
# estrutura. Se for necessário editar estas páginas pelo CMS no futuro, o
# caminho correcto é extrair só os blocos de conteúdo variável para campos
# estruturados (texto, imagem, etc.) e usar um template para recompor a
# página — isto fica como proposta em aberto, fora do âmbito desta integração.
